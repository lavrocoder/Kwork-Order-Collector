<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 260px; padding: 16px; margin: 0;
      background: #f8f9fa; color: #222;
    }
    h3 { margin: 0 0 12px; font-size: 15px; color: #21a038; }
    p  { margin: 0 0 10px; font-size: 13px; line-height: 1.5; color: #555; }
    .hint {
      background: #fff; border: 1px solid #e0e0e0; border-radius: 6px;
      padding: 10px 12px; font-size: 12px; color: #666; line-height: 1.6;
    }
    .hint b { color: #333; }
  </style>
</head>
<body>
  <h3>📦 Kwork Order Collector</h3>
  <p>Откройте любой заказ на <b>kwork.ru/track?id=…</b></p>
  <div class="hint">
    На странице заказа появится кнопка<br>
    <b>📥 Скачать raw.md</b> (правый нижний угол).<br><br>
    Нажмите её — расширение само раскроет всю переписку и скачает файл.
  </div>
</body>
</html>
